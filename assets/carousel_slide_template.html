<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Carousel Slide</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700;800&family=Anton&family=Inter:wght@500;700&display=swap" rel="stylesheet" />
<style>
  /*
    Single-slide template for Instagram Carousel posts.
    Rendered 5x by carousel_renderer.py, once per slide, then screenshotted
    to JPG. No crossfades, no slideshow timing — Instagram handles that when
    the user swipes in the feed.

    Dimensions: 1080x1350 (4:5 portrait) — max vertical for carousel feed posts.

    Visual language mirrors @_.daytrading_:
      - full-bleed photo background per slide (each slide has its OWN image)
      - huge Oswald/Anton uppercase body copy centred on a dark gradient
      - cyan highlight spans on key words / numbers
      - BREAKING badge top-left on slide 1 only
      - circular "deco" photo top-left, page pips bottom-centre, brand footer
      - prev/next chevrons hinting the user can swipe

    Placeholder contract (filled by carousel_renderer._build_slide_context):
      {{BG_URL}}           full-bleed background photo
      {{DECO_URL}}         circular photo in top-left decoration
      {{BADGE_VISIBLE}}    "inline-block" on slide 1, "none" elsewhere
      {{BADGE_LABEL}}      e.g. "BREAKING"
      {{BODY_HTML}}        main copy for this slide (contains <span class='h'>..</span>)
      {{BODY_SIZE_CLASS}}  "", "long", or "longer" — auto-chosen by Python
      {{PIP_0}}..{{PIP_4}} set to "active" on the current slide, "" otherwise
      {{PREV_VISIBLE}}     "flex" or "none" — hide prev arrow on slide 1
      {{NEXT_VISIBLE}}     "flex" or "none" — hide next arrow on slide 5
      {{BRAND_FOOTER}}     e.g. "FINANCEBLUEPRINTDAILY"
  */
  :root {
    --bg:      #05090E;
    --fg:      #FFFFFF;
    --muted:   #BCC7D3;
    --cyan:    #4DB8E8;
    --cyan2:   #6CCAF5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px; height: 1350px;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  .stage { position: relative; width: 1080px; height: 1350px; }

  .bg {
    position: absolute; inset: 0;
    background-image: url('{{BG_URL}}');
    background-size: cover;
    background-position: center;
  }
  /* Dark gradient pulls down over the bottom portion so text reads cleanly. */
  .bg::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(
      180deg,
      rgba(5,9,14,0.40) 0%,
      rgba(5,9,14,0.08) 28%,
      rgba(5,9,14,0.55) 58%,
      rgba(5,9,14,0.94) 100%
    );
  }

  /* -------------------------------------------------------------------
     Body text — Oswald uppercase, huge, centred in bottom half
     ------------------------------------------------------------------- */
  .body {
    position: absolute;
    left: 60px; right: 60px; bottom: 175px;
    z-index: 4;
    font-family: 'Oswald', 'Anton', 'Impact', sans-serif;
    font-weight: 800;
    font-size: 78px;
    line-height: 1.05;
    letter-spacing: 0.005em;
    text-transform: uppercase;
    color: var(--fg);
    text-align: center;
    text-shadow: 0 2px 18px rgba(0,0,0,0.55);
  }
  .body.long    { font-size: 66px; line-height: 1.08; }
  .body.longer  { font-size: 56px; line-height: 1.10; }
  .body .h {
    color: var(--cyan);
  }

  /* -------------------------------------------------------------------
     BREAKING badge (slide 1 only)
     ------------------------------------------------------------------- */
  .badge {
    position: absolute;
    left: 60px;
    bottom: 700px;
    z-index: 5;
    display: {{BADGE_VISIBLE}};
    padding: 14px 28px;
    background: var(--cyan);
    color: #05121C;
    font-family: 'Oswald', sans-serif;
    font-weight: 800;
    font-size: 40px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    box-shadow: 0 6px 24px rgba(77,184,232,0.35);
  }

  /* -------------------------------------------------------------------
     Circular logo-style decoration in the top-left corner
     ------------------------------------------------------------------- */
  .deco {
    position: absolute;
    top: 60px;
    left: 60px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background-image: url('{{DECO_URL}}');
    background-size: cover;
    background-position: center;
    border: 4px solid rgba(255,255,255,0.92);
    box-shadow: 0 8px 28px rgba(0,0,0,0.45);
    z-index: 6;
  }

  /* -------------------------------------------------------------------
     Page dots at very bottom + brand footer
     ------------------------------------------------------------------- */
  .pips {
    position: absolute;
    left: 0; right: 0;
    bottom: 118px;
    z-index: 7;
    display: flex;
    justify-content: center;
    gap: 14px;
  }
  .pip {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
  }
  .pip.active { background: var(--fg); }

  .brand-footer {
    position: absolute;
    left: 0; right: 0;
    bottom: 50px;
    z-index: 7;
    text-align: center;
    color: var(--fg);
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 32px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .brand-footer::before {
    content: '';
    display: block;
    width: 260px; height: 2px;
    background: var(--fg);
    margin: 0 auto 18px;
    opacity: 0.85;
  }

  /* Swipe-hint chevrons */
  .nav-hint {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 54px; height: 54px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: var(--fg);
    z-index: 6;
    opacity: 0.85;
  }
  .nav-prev { left: 28px; display: {{PREV_VISIBLE}}; }
  .nav-next { right: 28px; display: {{NEXT_VISIBLE}}; }
</style>
</head>
<body>
<div class="stage">
  <div class="bg"></div>
  <div class="deco"></div>
  <div class="badge">{{BADGE_LABEL}}</div>
  <div class="body {{BODY_SIZE_CLASS}}">{{BODY_HTML}}</div>
  <div class="nav-prev">&lsaquo;</div>
  <div class="nav-next">&rsaquo;</div>

  <div class="pips">
    <div class="pip {{PIP_0}}"></div>
    <div class="pip {{PIP_1}}"></div>
    <div class="pip {{PIP_2}}"></div>
    <div class="pip {{PIP_3}}"></div>
    <div class="pip {{PIP_4}}"></div>
  </div>
  <div class="brand-footer">{{BRAND_FOOTER}}</div>
</div>

<script>
  // Signal ready after fonts + bg images have loaded.
  async function boot() {
    try {
      if (document.fonts && document.fonts.ready) {
        await document.fonts.ready;
      }
    } catch (e) {}
    const urls = ["{{BG_URL}}", "{{DECO_URL}}"];
    await Promise.all(urls.map(u => new Promise(res => {
      if (!u) return res();
      const im = new Image();
      im.onload = im.onerror = () => res();
      im.src = u;
    })));
    await new Promise(r => setTimeout(r, 250));
    window.READY = true;
  }
  boot();
</script>
</body>
</html>
