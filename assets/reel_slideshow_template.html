<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Slideshow Reel</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700;800&family=Anton&family=Inter:wght@500;700&display=swap" rel="stylesheet" />
<style>
  /*
    News-carousel slideshow template.
    5 scenes x 5s = 25s total (matches reel_renderer.DURATION_S).
    Visual language mirrors @_.daytrading_:
      - full-bleed photo per slide (each slide has its OWN image)
      - huge Oswald/Anton uppercase body copy centred on a dark gradient
      - cyan highlight spans on key words / numbers
      - BREAKING badge top-left (slide 1 only)
      - page pip dots bottom-centre
      - brand underline at the very bottom

    Placeholder contract (filled by reel_renderer._build_slideshow_context):
      {{BADGE_LABEL}}        e.g. "BREAKING"
      {{BRAND_FOOTER}}       e.g. "FINANCEBLUEPRINT.CO"
      {{BG_1_URL}} .. {{BG_5_URL}}
      {{SLIDE_1_HTML}} .. {{SLIDE_5_HTML}}   (already contains <span class='h'>..</span>)
  */
  :root {
    --bg:      #05090E;
    --fg:      #FFFFFF;
    --muted:   #BCC7D3;
    --cyan:    #4DB8E8;   /* matches the daytrading highlight tone */
    --cyan2:   #6CCAF5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px; height: 1920px;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  .stage { position: relative; width: 1080px; height: 1920px; }

  /* -------------------------------------------------------------------
     Per-scene container
     ------------------------------------------------------------------- */
  .scene {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 0.55s ease-in-out;
  }
  .scene.active { opacity: 1; }

  .bg {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
  }
  /* Dark gradient pulls down over the bottom 60% so text reads cleanly. */
  .bg::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(
      180deg,
      rgba(5,9,14,0.45) 0%,
      rgba(5,9,14,0.10) 30%,
      rgba(5,9,14,0.55) 60%,
      rgba(5,9,14,0.92) 100%
    );
  }

  /* -------------------------------------------------------------------
     Body text — Oswald uppercase, huge, centred in bottom half
     ------------------------------------------------------------------- */
  .body {
    position: absolute;
    left: 60px; right: 60px; bottom: 170px;
    z-index: 4;
    font-family: 'Oswald', 'Anton', 'Impact', sans-serif;
    font-weight: 800;
    font-size: 78px;
    line-height: 1.05;
    letter-spacing: 0.005em;
    text-transform: uppercase;
    color: var(--fg);
    text-align: center;
    /* Subtle text shadow keeps edges crisp on busy photos. */
    text-shadow: 0 2px 18px rgba(0,0,0,0.55);
  }
  .body .h {
    /* Cyan highlight for key words / numbers */
    color: var(--cyan);
  }
  .body.long    { font-size: 66px; line-height: 1.08; }
  .body.longer  { font-size: 58px; line-height: 1.10; }

  /* -------------------------------------------------------------------
     Slide 1 only: BREAKING-style badge
     ------------------------------------------------------------------- */
  .badge {
    position: absolute;
    left: 60px;
    bottom: 1040px;   /* sits just above the body copy on slide 1 */
    z-index: 5;
    padding: 14px 28px;
    background: var(--cyan);
    color: #05121C;
    font-family: 'Oswald', sans-serif;
    font-weight: 800;
    font-size: 42px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    box-shadow: 0 6px 24px rgba(77,184,232,0.35);
    display: none;   /* hidden by default, shown only on slide 1 */
  }
  .scene[data-scene="0"] .badge { display: inline-block; }

  /* -------------------------------------------------------------------
     Circular logo-style decoration in the top-left corner
     ------------------------------------------------------------------- */
  .deco {
    position: absolute;
    top: 70px;
    left: 70px;
    width: 210px; height: 210px;
    border-radius: 50%;
    background-size: cover;
    background-position: center;
    border: 4px solid rgba(255,255,255,0.92);
    box-shadow: 0 8px 28px rgba(0,0,0,0.45);
    z-index: 6;
    /* Each scene swaps its own BG image inline. */
  }

  /* -------------------------------------------------------------------
     Page dots at very bottom + brand underline footer
     ------------------------------------------------------------------- */
  .pips {
    position: absolute;
    left: 0; right: 0;
    bottom: 115px;
    z-index: 7;
    display: flex;
    justify-content: center;
    gap: 14px;
  }
  .pip {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    transition: background 0.3s ease;
  }
  .pip.active { background: var(--fg); }

  .brand-footer {
    position: absolute;
    left: 0; right: 0;
    bottom: 50px;
    z-index: 7;
    text-align: center;
    color: var(--fg);
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 34px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .brand-footer::before {
    content: '';
    display: block;
    width: 260px; height: 2px;
    background: var(--fg);
    margin: 0 auto 18px;
    opacity: 0.85;
  }

  /* Subtle corner arrows like the daytrading carousels when NOT on first/last slide.
     Drawn via CSS — no external assets needed. */
  .nav-hint {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 54px; height: 54px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: var(--fg);
    z-index: 6;
    opacity: 0.85;
  }
  .nav-prev { left: 28px; }
  .nav-next { right: 28px; }
  .scene[data-scene="0"] .nav-prev { display: none; }
  .scene[data-scene="4"] .nav-next { display: none; }
</style>
</head>
<body>
<div class="stage">

  <!-- Scene 1 -->
  <div class="scene" data-scene="0">
    <div class="bg" style="background-image:url('{{BG_1_URL}}');"></div>
    <div class="deco" style="background-image:url('{{BG_2_URL}}');"></div>
    <div class="badge">{{BADGE_LABEL}}</div>
    <div class="body">{{SLIDE_1_HTML}}</div>
    <div class="nav-next">&rsaquo;</div>
  </div>

  <!-- Scene 2 -->
  <div class="scene" data-scene="1">
    <div class="bg" style="background-image:url('{{BG_2_URL}}');"></div>
    <div class="deco" style="background-image:url('{{BG_1_URL}}');"></div>
    <div class="body">{{SLIDE_2_HTML}}</div>
    <div class="nav-prev">&lsaquo;</div>
    <div class="nav-next">&rsaquo;</div>
  </div>

  <!-- Scene 3 -->
  <div class="scene" data-scene="2">
    <div class="bg" style="background-image:url('{{BG_3_URL}}');"></div>
    <div class="deco" style="background-image:url('{{BG_2_URL}}');"></div>
    <div class="body">{{SLIDE_3_HTML}}</div>
    <div class="nav-prev">&lsaquo;</div>
    <div class="nav-next">&rsaquo;</div>
  </div>

  <!-- Scene 4 -->
  <div class="scene" data-scene="3">
    <div class="bg" style="background-image:url('{{BG_4_URL}}');"></div>
    <div class="deco" style="background-image:url('{{BG_3_URL}}');"></div>
    <div class="body">{{SLIDE_4_HTML}}</div>
    <div class="nav-prev">&lsaquo;</div>
    <div class="nav-next">&rsaquo;</div>
  </div>

  <!-- Scene 5 -->
  <div class="scene" data-scene="4">
    <div class="bg" style="background-image:url('{{BG_5_URL}}');"></div>
    <div class="deco" style="background-image:url('{{BG_4_URL}}');"></div>
    <div class="body">{{SLIDE_5_HTML}}</div>
    <div class="nav-prev">&lsaquo;</div>
  </div>

  <!-- Shared chrome -->
  <div class="pips">
    <div class="pip" data-pip="0"></div>
    <div class="pip" data-pip="1"></div>
    <div class="pip" data-pip="2"></div>
    <div class="pip" data-pip="3"></div>
    <div class="pip" data-pip="4"></div>
  </div>
  <div class="brand-footer">{{BRAND_FOOTER}}</div>
</div>

<script>
  const BG_URLS = [
    "{{BG_1_URL}}",
    "{{BG_2_URL}}",
    "{{BG_3_URL}}",
    "{{BG_4_URL}}",
    "{{BG_5_URL}}"
  ];

  /* Auto-size body text per slide so longer paragraphs still fit
     without clipping into the brand footer. */
  function fitBodies() {
    document.querySelectorAll('.body').forEach(el => {
      const chars = el.textContent.length;
      el.classList.remove('long', 'longer');
      if (chars > 180) el.classList.add('longer');
      else if (chars > 130) el.classList.add('long');
    });
  }

  function preloadImages(urls) {
    return Promise.all(urls.map(u => new Promise(res => {
      if (!u) return res();
      const im = new Image();
      im.onload = im.onerror = () => res();
      im.src = u;
    })));
  }

  async function boot() {
    try {
      if (document.fonts && document.fonts.ready) {
        await document.fonts.ready;
      }
    } catch (e) {}
    fitBodies();
    await preloadImages(BG_URLS);
    await new Promise(r => setTimeout(r, 200));
    startSlideshow();
    window.READY = true;
  }

  function startSlideshow() {
    const scenes = Array.from(document.querySelectorAll('.scene'));
    const pips   = Array.from(document.querySelectorAll('.pip'));
    const SCENE_MS = 5000;

    let idx = 0;
    function show(i) {
      scenes.forEach((s, si) => s.classList.toggle('active', si === i));
      pips.forEach((p, pi) => p.classList.toggle('active', pi === i));
    }
    show(0);

    const tick = () => {
      idx += 1;
      if (idx >= scenes.length) return;
      show(idx);
      setTimeout(tick, SCENE_MS);
    };
    setTimeout(tick, SCENE_MS);
  }

  boot();
</script>
</body>
</html>
