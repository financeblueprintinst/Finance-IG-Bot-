name: Daily Carousel Post

# Runs on the days the animated reel (reel.yml) does NOT run.
# Animated reel: Tue, Thu, Sat, Sun  → covered there.
# Carousel:      Mon, Wed, Fri       → this workflow.
#
# Posts ONE swipeable 5-image Carousel from the finance-news story of the day.
# JPGs only (1080x1350, 4:5). No video, no auto-play — user swipes manually
# in their Instagram feed.

on:
  schedule:
    # Mon, Wed, Fri at 16:00 UTC (= 18:00 CEST in summer / 17:00 CET in winter)
    - cron: "0 16 * * 1,3,5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Render only, don't publish"
        required: false
        type: boolean
        default: false

permissions:
  contents: write  # to commit the generated JPGs / metadata json

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Render carousel JPGs (no publish)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          BRAND_NAME: ${{ vars.BRAND_NAME }}
          BRAND_HANDLE: ${{ vars.BRAND_HANDLE }}
          DRY_RUN: "1"
        run: python src/reel_main.py --render-only --slideshow

      - name: Commit generated carousel files + manual-reel mirror
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/carousel_*.jpg output/carousel_*.json output/manual_reel/ || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(carousel): $(date -u +%Y-%m-%d)"
            for i in 1 2 3; do
              git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" && git push && break || true
              echo "Push attempt $i failed, retrying after sleep..."
              sleep 5
            done
          else
            echo "No new carousel files to commit."
          fi

      - name: Wait for raw.githubusercontent CDN propagation
        if: ${{ !inputs.dry_run }}
        run: sleep 25

      - name: Publish carousel to Instagram
        if: ${{ !inputs.dry_run }}
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          BRAND_NAME: ${{ vars.BRAND_NAME }}
          BRAND_HANDLE: ${{ vars.BRAND_HANDLE }}
        run: python src/reel_main.py --publish-existing --slideshow
