name: Daily Slideshow Reel

# Runs on the days the animated reel (reel.yml) does NOT run.
# Animated reel:   Tue, Thu, Sat, Sun → covered there.
# Slideshow reel:  Mon, Wed, Fri      → this workflow.
#
# Posts ONE thing from the finance-news story of the day:
#   - A Slideshow Reel video with music (MP4, 1080x1920, ~25s).
#     5 scenes with crossfade, royalty-free track from assets/music/.

on:
  schedule:
    # Mon, Wed, Fri at 16:00 UTC (= 18:00 CEST in summer / 17:00 CET in winter)
    - cron: "0 16 * * 1,3,5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Render only, don't publish"
        required: false
        type: boolean
        default: false

permissions:
  contents: write  # to commit the generated MP4 / metadata json

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system ffmpeg
        run: sudo apt-get update -q && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Render slideshow reel MP4 (no publish)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          BRAND_NAME: ${{ vars.BRAND_NAME }}
          BRAND_HANDLE: ${{ vars.BRAND_HANDLE }}
          DRY_RUN: "1"
        run: python src/reel_main.py --render-only --slideshow

      - name: Commit generated slideshow reel MP4
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/slideshow_*.mp4 output/slideshow_*.json || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(slideshow-reel): $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No new slideshow files to commit."
          fi

      - name: Wait for raw.githubusercontent CDN propagation
        if: ${{ !inputs.dry_run }}
        run: sleep 25

      - name: Publish slideshow reel to Instagram
        if: ${{ !inputs.dry_run }}
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          BRAND_NAME: ${{ vars.BRAND_NAME }}
          BRAND_HANDLE: ${{ vars.BRAND_HANDLE }}
        run: python src/reel_main.py --publish-existing --slideshow
