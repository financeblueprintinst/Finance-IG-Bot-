name: Daily Instagram Post

on:
  schedule:
    - cron: "55 18 * * *"
  workflow_dispatch:
    inputs:
      post_type:
        description: "Override post type (leave blank for today's rotation)"
        required: false
        type: choice
        default: ""
        options:
          - ""
          - market_recap
          - gainers_losers
          - commodities_forex
          - weekly_recap
          - news_digest
      dry_run:
        description: "Render only, don't publish"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Render image
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BRAND_NAME: ${{ vars.BRAND_NAME }}
          BRAND_HANDLE: ${{ vars.BRAND_HANDLE }}
          DRY_RUN: "1"
        run: |
          args=""
          if [ -n "${{ inputs.post_type }}" ]; then
            args="--type ${{ inputs.post_type }}"
          fi
          python src/main.py --dry-run $args

      - name: Commit generated image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/*.png || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(post): daily image $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No new image to commit."
          fi

      - name: Publish to Instagram
        if: ${{ !inputs.dry_run }}
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          BRAND_NAME: ${{ vars.BRAND_NAME }}
          BRAND_HANDLE: ${{ vars.BRAND_HANDLE }}
        run: |
          args=""
          if [ -n "${{ inputs.post_type }}" ]; then
            args="--type ${{ inputs.post_type }}"
          fi
          python src/main.py $args
