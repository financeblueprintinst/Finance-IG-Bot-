name: Daily Reel Post

on:
  schedule:
    # Tue, Thu, Sat, Sun at 13:00 UTC
    # (= 15:00 CEST in summer / 14:00 CET in winter).
    - cron: "0 13 * * 2,4,6,0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Render only, don't publish"
        required: false
        type: boolean
        default: false

permissions:
  contents: write  # to commit the generated MP4 / MP3 / metadata json

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system ffmpeg
        run: sudo apt-get update -q && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Render reel (video + audio + metadata, no publish)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BRAND_NAME: ${{ vars.BRAND_NAME }}
          BRAND_HANDLE: ${{ vars.BRAND_HANDLE }}
          DRY_RUN: "1"
        run: python src/reel_main.py --render-only

      - name: Commit generated reel files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/reel_*.mp4 output/reel_*.mp3 output/reel_*.json || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(reel): $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No new reel files to commit."
          fi

      - name: Wait for raw.githubusercontent CDN propagation
        if: ${{ !inputs.dry_run }}
        run: sleep 25

      - name: Publish reel to Instagram
        if: ${{ !inputs.dry_run }}
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          BRAND_NAME: ${{ vars.BRAND_NAME }}
          BRAND_HANDLE: ${{ vars.BRAND_HANDLE }}
        run: python src/reel_main.py --publish-existing
